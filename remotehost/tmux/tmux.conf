# Observations:
# However, having multiple sets of keys in the same table and repeatable
# means that unrelated movements will chain into eachother which is very
# likely to be unwanted behavior. Example: bind prefix=C-b with -r, then
# moving backwards with C-b, start typing something that is NOT C-b and
# happens to be bound with -r, its binding will be fired instead of just
# typing.

# ====================
# Ensure correct color
# ====================
%if "#{&&:#{m:*256color*,$TERM},#{!=:#{m:*256color*,#{default-terminal}},1}}"
run-shell -C "set -sg default-terminal \"#{default-terminal}-256color\""
# not sure, but terminal-overrides this doesn't seem to do anything...
set -a terminal-overrides '*256color*:colors=256'
%endif

# =============
# Ensure prefix
# =============
%if "#{==:#{prefix},None}"
# set prefix to the default C-b temporarily
set-option -g prefix C-b
%endif

# =========================
# Noop table to end repeats
# =========================
bind -Tnoop a 'send-keys a'

# =======================
# navigation/organization
# =======================
# The bind table is called "naviorg" short for navigation/organization.
# The keys that enter the naviorg table:
# * C-n   Do nothing
# * hjkl  Move left down up right one pane
# * HJKL  Swap current pane left down up right one pane
# * oO    Step through next/previous pane
# * np    next/previous window
#
# These keys have the same meaning within the naviorg table.  While in the
# naviorg table, display-panes will display the pane numbers until repeat-time
# expires so as long as the numbers are visible, the naviorg keys can be
# repeated without any prefix key.
#
# In addition to the above, the naviorg table also has these bindings:
# * 1-7    select layouts (horz vert, mainhorz, mainvert, tiled, mainhorz-rev mainvertrev)
# * Space  3 possible functions:
#          1. mark the pane if no panes are marked
#          2. Unmark the pane if it is already marked
#          3. Swap the current pane and marked pane if there is a marked pane.
# * v      join marked pane with current pane vertically
# * V      join marked pane with current pane horizontally
# * !      break current pane into new window
# * %"     split pane horizontally/vertically
# * c      new window
# * eE     equalize adjacent panes
# * wasd   resize current pane
# * WASD   resize current pane faster
# * Escape Remove mark if any marked panes.  Otherwise, exit naviorg table.
# * Enter  swap windows if mark exists.  Otherwise, exit naviorg table.
# * z      Zoom the current pane and exit naviorg table
#
bind -r C-n 'switch-client -Tnaviorg; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r o 'select-pane -t "+"; switch-client -Tnaviorg; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r O 'select-pane -t "-"; switch-client -Tnaviorg; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r h 'select-pane -L; switch-client -Tnaviorg; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r j 'select-pane -D; switch-client -Tnaviorg; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r k 'select-pane -U; switch-client -Tnaviorg; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r l 'select-pane -R; switch-client -Tnaviorg; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r H 'swap-pane -d -t "{left-of}"; switch-client -Tnaviorg; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r J 'swap-pane -d -t "{down-of}"; switch-client -Tnaviorg; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r K 'swap-pane -d -t "{up-of}"; switch-client -Tnaviorg; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r L 'swap-pane -d -t "{right-of}"; switch-client -Tnaviorg; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r n 'next-window; switch-client -Tnaviorg; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r p 'previous-window; switch-client -Tnaviorg; run-shell -C "display-panes -N -d #{repeat-time}"'

bind -r -Tnaviorg o 'select-pane -t "+"; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r -Tnaviorg O 'select-pane -t "-"; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r -Tnaviorg h 'select-pane -L; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r -Tnaviorg j 'select-pane -D; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r -Tnaviorg k 'select-pane -U; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r -Tnaviorg l 'select-pane -R; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r -Tnaviorg H 'swap-pane -d -t "{left-of}"; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r -Tnaviorg J 'swap-pane -d -t "{down-of}"; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r -Tnaviorg K 'swap-pane -d -t "{up-of}"; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r -Tnaviorg L 'swap-pane -d -t "{right-of}"; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r -Tnaviorg n 'next-window; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r -Tnaviorg p 'previous-window; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r -Tnaviorg 1 'select-layout even-horizontal; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r -Tnaviorg 2 'select-layout even-vertical; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r -Tnaviorg 3 'select-layout main-horizontal; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r -Tnaviorg 4 'select-layout main-vertical; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r -Tnaviorg 5 'select-layout tiled; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r -Tnaviorg 6 'select-layout main-horizontal-mirrored; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r -Tnaviorg 7 'select-layout main-vertical-mirrored; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r -Tnaviorg Space 'run-shell -C "#{?pane_marked,select-pane -M,#{?pane_marked_set,swap-pane -d; select-pane -M,select-pane -m}}; display-panes -N -d #{repeat-time}"'
bind -r -Tnaviorg v 'run-shell -C "#{?#{!=:#{pane_marked_set},#{pane_marked}},joinp -v;,}display-panes -N -d #{repeat-time}"'
bind -r -Tnaviorg V 'run-shell -C "#{?#{!=:#{pane_marked_set},#{pane_marked}},joinp -h;,}display-panes -N -d #{repeat-time}"'
bind -r -Tnaviorg ! breakp
bind -r -Tnaviorg % 'split-window -h; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r -Tnaviorg '"' 'split-window -v; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r -Tnaviorg c 'new-window; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r -Tnaviorg e 'select-layout -E; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r -Tnaviorg E 'select-layout -E; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r -Tnaviorg w 'resize-pane -U; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r -Tnaviorg s 'resize-pane -D; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r -Tnaviorg a 'resize-pane -L; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r -Tnaviorg d 'resize-pane -R; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r -Tnaviorg W 'resize-pane -U 5; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r -Tnaviorg S 'resize-pane -D 5; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r -Tnaviorg A 'resize-pane -L 5; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r -Tnaviorg D 'resize-pane -R 5; run-shell -C "display-panes -N -d #{repeat-time}"'
bind -r -Tnaviorg Escape 'run-shell -C "#{?pane_marked_set,select-pane -M; display-panes -N -d #{repeat-time},switch-client -Tnoop}"'
bind -r -Tnaviorg Enter 'run-shell -C "#{?#{==:#{window_marked_flag},#{pane_marked_set}},switch-client -Tnoop,swap-window; display-panes -N -d #{repeat-time}}"'
bind -r -Tnaviorg z 'resize-pane -Z; switch-client -Tnoop'


# =============
# repeat prefix
# =============
run-shell -C 'bind -r #{q:prefix} "send-keys #{q:prefix}; switch-client -Treppre"'
run-shell -C 'bind -r -Treppre #{q:prefix} "send-keys #{q:prefix}"'
bind -r -Treppre Enter 'switch-client -Tnoop'

# ==============
# Extra bindings
# ==============
# Extend original pane selection duration
bind q display-panes -d 0
# Set the current path.
bind P 'attach-session -c "#{pane_current_path}"; display-message -d0 "new session_path: #{session_path}"'
# toggle mark instead of only set
bind m 'run-shell -C "select-pane #{?pane_marked,-M,-m}"'
# allow lowercase e to equalize panes too
bind e select-layout -E

# =======
# options
# =======
# Extend the repeat duration
set-option -g repeat-time 5000
# Increase display-panes (in)active contrast.
set-option -g display-panes-active-colour '#ff0000'
set-option -g display-panes-colour '#000077'
# Because in the status line, ^[^[ causes tmux to crash
# so explicitly use emacs bindings for the status line.
set-option -g status-keys emacs
set-option -wg mode-keys vi
# After some research, it seems that escape-time is mainly
# used for
# 1. allowing pressing escape, and then a key to activate M-*
# 2. ?allow M-* bindings in a remote terminal where keypresses
#    being sent might be split into separate packets which might
#    or might not be delayed resulting in a separate escape
#    and key instead of the M-* binding?
set-option -sg escape-time 100

# =====================================
# Change prefix key for normal bindings
# =====================================
# Issues with the prefix key:
# 1. It does not interrupt repeat mode
# 2. It takes precedence over every binding
# This results in some issues:
# 1. no immediate prefix table bindings after a repeated keybind
# 2. Cannot use the prefix key for bindings in any table (except prefix table)
run-shell -C "bind -Troot #{q:prefix} 'switch-client -Tprefix'"
# copy prefix table to the copy-mode*-prefix tables
run-shell "tmux list-keys -Tprefix | sed 's/-T *prefix/-T copy-mode-prefix/' | tmux source-file -"
run-shell "tmux list-keys -Tprefix | sed 's/-T *prefix/-T copy-mode-vi-prefix/' | tmux source-file -"
# Set the prefix binding to whatever the original copy-mode binding was but make it repeatable too
run-shell "tmux list-keys -Tcopy-mode #{q:prefix} | sed 's/\\( -r\\)\\? *-T *copy-mode/ -r -T copy-mode-prefix/' | tmux source-file -"
run-shell "tmux list-keys -Tcopy-mode-vi #{q:prefix} | sed 's/\\( -r\\)\\? *-T *copy-mode-vi/ -r -T copy-mode-vi-prefix/' | tmux source-file -"
# prefix in copymode goes to the new copy-mode*-prefix tables
run-shell -C "bind -Tcopy-mode #{q:prefix} 'switch-client -Tcopy-mode-prefix'"
run-shell -C "bind -Tcopy-mode-vi #{q:prefix} 'switch-client -Tcopy-mode-vi-prefix'"

set-option -g prefix None
