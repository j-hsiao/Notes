# Observations:
# However, having multiple sets of keys in the same table and repeatable
# means that unrelated movements will chain into eachother which is very
# likely to be unwanted behavior. Example: bind prefix=C-b with -r, then
# moving backwards with C-b, start typing something that is NOT C-b and
# happens to be bound with -r, its binding will be fired instead of just
# typing.

%if "#{&&:#{m:*256color*,$TERM},#{!=:#{m:*256color*,#{default-terminal}},1}}"
run-shell -C "set -sg default-terminal \"#{default-terminal}-256color\""
# not sure, but terminal-overrides this doesn't seem to do anything...
set -a terminal-overrides '*256color*:colors=256'
%endif

%if "#{==:#{prefix},None}"
# set prefix to the default C-b temporarily
set-option -g prefix C-b
%endif
# EFfectively empty key-table (prefix keybind never activates.)
bind -Tnoop a 'send-keys a'

# hjkl pane movement
bind -r h "select-pane -L; switch-client -Tpanehjkl"
bind -r j "select-pane -D; switch-client -Tpanehjkl"
bind -r k "select-pane -U; switch-client -Tpanehjkl"
bind -r l "select-pane -R; switch-client -Tpanehjkl"
bind -r -Tpanehjkl h "select-pane -L"
bind -r -Tpanehjkl j "select-pane -D"
bind -r -Tpanehjkl k "select-pane -U"
bind -r -Tpanehjkl l "select-pane -R"
bind -r -Tpanehjkl Enter "resize-pane -Z; switch-client -Tnoop"
bind -r -Tpanehjkl Escape "switch-client -Tnoop"

# oO pane movements
bind -r o "select-pane -t '+'; switch-client -TpaneoO"
bind -r O "select-pane -t '-'; switch-client -TpaneoO"
bind -r -TpaneoO o "select-pane -t '+'"
bind -r -TpaneoO O "select-pane -t '-'"
bind -r -TpaneoO Enter "resize-pane -Z; switch-client -Tnoop"
bind -r -TpaneoO Escape "switch-client -Tnoop"

# moving panes
bind -r H "swap-pane -d -t '{left-of}'; switch-client -TpaneHJKL"
bind -r J "swap-pane -d -t '{down-of}'; switch-client -TpaneHJKL"
bind -r K "swap-pane -d -t '{up-of}'; switch-client -TpaneHJKL"
bind -r L "swap-pane -d -t '{right-of}'; switch-client -TpaneHJKL"
bind -r -TpaneHJKL H "swap-pane -d -t '{left-of}'"
bind -r -TpaneHJKL J "swap-pane -d -t '{down-of}'"
bind -r -TpaneHJKL K "swap-pane -d -t '{up-of}'"
bind -r -TpaneHJKL L "swap-pane -d -t '{right-of}'"
bind -r -TpaneHJKL Enter "switch-client -Tnoop"
bind -r -TpaneHJKL Escape "switch-client -Tnoop"

# easier relative changes
bind -r n "next-window; switch-client -Twindownp"
bind -r p "previous-window; switch-client -Twindownp"
bind -r -Twindownp n next-window
bind -r -Twindownp p previous-window
bind -r -Twindownp Enter "switch-client -Tnoop"
bind -r -Twindownp Escape "switch-client -Tnoop"

# switching layouts
bind -r Space "next-layout; switch-client -TlayoutSpace"
bind -r -TlayoutSpace Space next-layout
bind -r -TlayoutSpace Enter "switch-client -Tnoop"
bind -r -TlayoutSpace Escape "switch-client -Tnoop"

# repeat prefix
run-shell -C "bind -r #{prefix} 'send-keys #{prefix}; switch-client -Treppre'"
run-shell -C "bind -r -Treppre #{prefix} 'send-keys #{prefix}"
bind -r -Treppre Enter "switch-client -Tnoop"
bind -r -Treppre Escape "switch-client -Tnoop"

# For convenience
bind e select-layout -E

# Extend pane selection duration
bind q display-panes -d 0

# options
# Extend the repeat duration
set-option -g repeat-time 1000
# Because in the status line, ^[^[ causes tmux to crash
# so explicitly use emacs bindings for the status line.
set-option -g status-keys emacs
set-option -wg mode-keys vi
# From reading, it seems that escape-time is mainly
# used for
# 1. allowing pressing escape, and then a key to activate M-*
# 2. ?allow M-* bindings in a remote terminal where keypresses
#    being sent might be split into separate packets which might
#    or might not be delayed resulting in a separate escape
#    and key instead of the M-* binding?
set-option -sg escape-time 100

# Disable special treatment of prefix
run-shell -C "bind -Troot #{prefix} 'switch-client -Tprefix'"

# Leave prefix as some key that is basically never touched.
# Having prefix still has its uses (example: after entering
# copy mode, can "scroll" the buffer, but now in the copy table.
# the prefix setting would be handled before the copy table
# allowing jumping to another buffer while the original is
# still scrolled to a certain spot.)
set-option -g prefix F7
run-shell -C "bind #{prefix} send-prefix"
