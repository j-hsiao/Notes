bind -r C-b send-prefix         # C-b to go back a character in the shell is not so painful
bind -r o select-pane -t ':.+'  # Can just quickly tap o to cycle through panes
bind -r h select-pane -L        # vim-like moving to adjacent pane
bind -r j select-pane -D        # vim-like moving to adjacent pane
bind -r k select-pane -U        # vim-like moving to adjacent pane
bind -r l select-pane -R        # vim-like moving to adjacent pane

bind 0 select-pane -t ':.0'
bind 1 select-pane -t ':.1'
bind 2 select-pane -t ':.2'
bind 3 select-pane -t ':.3'
bind 4 select-pane -t ':.4'
bind 5 select-pane -t ':.5'
bind 6 select-pane -t ':.6'
bind 7 select-pane -t ':.7'
bind 8 select-pane -t ':.8'
bind 9 select-pane -t ':.9'
