# It seems that -r just means to keep using that binding table.
# However, having multiple sets of keys in the same table and repeatable
# means that unrelated movements will chain into eachother which is very
# likely to be unwanted behavior. Example: bind prefix=C-b with -r, then
# moving backwards with C-b, start typing something that is NOT C-b and
# happens to be bound with -r, its binding will be fired instead of just
# typing.
# ijkl pane movement
bind -r -Tpaneijkl i "select-pane -U"
bind -r -Tpaneijkl j "select-pane -L"
bind -r -Tpaneijkl k "select-pane -D"
bind -r -Tpaneijkl l "select-pane -R"
bind -r -Tpaneijkl Enter "switch-client -Troot"
bind i "select-pane -U; switch-client -Tpaneijkl"
bind j "select-pane -L; switch-client -Tpaneijkl"
bind k "select-pane -D; switch-client -Tpaneijkl"
bind l "select-pane -R; switch-client -Tpaneijkl"

# oO pane movements
bind o "select-pane -t '+'; switch-client -TpaneoO"
bind O "select-pane -t '-'; switch-client -TpaneoO"
bind -r -TpaneoO o select-pane -t '+'
bind -r -TpaneoO O select-pane -t '-'
bind -r -TpaneoO Enter "switch-client -Troot"

# moving panes
bind I "swap-pane -d -t '{up-of}'; switch-client -TpaneIJKL"
bind J "swap-pane -d -t '{left-of}'; switch-client -TpaneIJKL"
bind K "swap-pane -d -t '{down-of}'; switch-client -TpaneIJKL"
bind L "swap-pane -d -t '{right-of}'; switch-client -TpaneIJKL"
bind -r -TpaneIJKL I swap-pane -d -t '{up-of}'
bind -r -TpaneIJKL J swap-pane -d -t '{left-of}'
bind -r -TpaneIJKL K swap-pane -d -t '{down-of}'
bind -r -TpaneIJKL L swap-pane -d -t '{right-of}'
bind -r -TpaneIJKL Enter "switch-client -Troot"


# easier relative changes
bind n "next-window; switch-client -Twindownp"
bind p "previous-window; switch-client -Twindownp"
bind -r -Twindownp n next-window
bind -r -Twindownp p previous-window
bind -r -Twindownp Enter "switch-client -Troot"

# switching layouts
bind Space "next-layout; switch-client -TlayoutSpace"
bind -r -TlayoutSpace Space next-layout

# repeat prefix
# It seems like the separate table does not seem to work with #{prefix}
# #{prefix} in the repprefix table just seems to re-activate the prefix table
# instead of activating the repprefix #{prefix} binding.
run-shell -C "bind -r #{prefix} send-prefix"
#run-shell -C "bind #{prefix} \"send-prefix; switch-client -Trepprefix\""
#run-shell -C "bind -r -Trepprefix #{prefix} \"display-message why; send-prefix\""
#run-shell -C "bind -r -Trepprefix b \"display-message why; send-prefix\""

# For convenience
bind e select-layout -E

# Extend pane selection duration
bind q display-panes -d 0

# Extend the repeat duration
set-option -g repeat-time 1000
# Simple way to cancel repeating commands
bind -r Enter "switch-client -Troot"
